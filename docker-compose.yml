services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mattermost
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mattermost:
    build:
      context: .
      dockerfile: Dockerfile.branded
      args:
        SITE_NAME: ${SITE_NAME:-Mattermost}
    image: mattermost-relay-branded:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:${POSTGRES_PASSWORD}@postgres:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: https://${DOMAIN}
      MM_TEAMSETTINGS_SITENAME: ${SITE_NAME:-Mattermost}
      MM_FILESETTINGS_MAXFILESIZE: "52428800"
      # AWS SES SMTP — see SETUP.md Phase 5. Credentials come from .env.
      MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS: "true"
      MM_EMAILSETTINGS_REQUIREEMAILVERIFICATION: "true"
      MM_EMAILSETTINGS_FEEDBACKNAME: ${SITE_NAME:-Mattermost}
      MM_EMAILSETTINGS_FEEDBACKEMAIL: ${SES_FROM_ADDRESS}
      MM_EMAILSETTINGS_REPLYTOADDRESS: ${SES_FROM_ADDRESS}
      MM_EMAILSETTINGS_SMTPSERVER: ${SES_SMTP_HOST:-email-smtp.us-east-1.amazonaws.com}
      MM_EMAILSETTINGS_SMTPPORT: "587"
      MM_EMAILSETTINGS_CONNECTIONSECURITY: STARTTLS
      MM_EMAILSETTINGS_ENABLESMTPAUTH: "true"
      MM_EMAILSETTINGS_SMTPUSERNAME: ${SES_SMTP_USERNAME}
      MM_EMAILSETTINGS_SMTPPASSWORD: ${SES_SMTP_PASSWORD}
    volumes:
      - mattermost-config:/mattermost/config
      - mattermost-data:/mattermost/data
      - mattermost-logs:/mattermost/logs
      - mattermost-plugins:/mattermost/plugins
      - mattermost-client-plugins:/mattermost/client/plugins
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8065/api/v4/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - mattermost
    networks:
      - internal

volumes:
  postgres-data:
  mattermost-config:
  mattermost-data:
  mattermost-logs:
  mattermost-plugins:
  mattermost-client-plugins:
  caddy-data:
  caddy-config:

networks:
  internal:
